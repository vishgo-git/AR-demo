<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Krishna AR Demo</title>

    <!-- MindAR + A-Frame -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #000;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      /* Loading Screen */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #1a0a2e 0%, #2d1557 50%, #1a0a2e 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.8s ease;
      }

      #loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .om-symbol {
        font-size: 72px;
        color: #f5c842;
        animation: pulse 2s ease-in-out infinite;
        text-shadow: 0 0 30px rgba(245, 200, 66, 0.6);
        margin-bottom: 20px;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.1); opacity: 0.8; }
      }

      .loading-title {
        color: #f5c842;
        font-size: 22px;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .loading-subtitle {
        color: rgba(245, 200, 66, 0.6);
        font-size: 13px;
        letter-spacing: 2px;
        margin-bottom: 40px;
      }

      .loading-bar-wrap {
        width: 220px;
        height: 2px;
        background: rgba(245, 200, 66, 0.15);
        border-radius: 2px;
        overflow: hidden;
        margin-bottom: 16px;
      }

      .loading-bar {
        height: 100%;
        background: #f5c842;
        border-radius: 2px;
        animation: load 3s ease forwards;
      }

      @keyframes load {
        0% { width: 0%; }
        100% { width: 100%; }
      }

      .loading-status {
        color: rgba(245, 200, 66, 0.5);
        font-size: 11px;
        letter-spacing: 1px;
      }

      /* Instructions overlay */
      #instructions {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px;
        background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
        z-index: 100;
        text-align: center;
        pointer-events: none;
      }

      .instruction-text {
        color: #f5c842;
        font-size: 15px;
        letter-spacing: 1px;
        text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        animation: fadeInUp 1s ease 3.5s both;
      }

      .scan-icon {
        font-size: 28px;
        display: block;
        margin-bottom: 6px;
        animation: fadeInUp 1s ease 3.2s both;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Top brand bar */
      #brand-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        padding: 14px 20px;
        background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: fadeInUp 1s ease 3.8s both;
        opacity: 0;
      }

      #brand-bar.visible { opacity: 1; }

      .brand-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #f5c842;
        box-shadow: 0 0 8px #f5c842;
      }

      .brand-name {
        color: #f5c842;
        font-size: 13px;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      /* YouTube video overlay panel */
      #video-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.88);
        z-index: 500;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        animation: overlayIn 0.4s ease;
      }

      #video-overlay.active {
        display: flex;
      }

      @keyframes overlayIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }

      .video-header {
        color: #f5c842;
        font-size: 13px;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 16px;
        opacity: 0.8;
      }

      .video-frame-wrap {
        width: 100%;
        max-width: 500px;
        aspect-ratio: 16/9;
        border: 1px solid rgba(245, 200, 66, 0.3);
        border-radius: 4px;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(245, 200, 66, 0.15);
      }

      .video-frame-wrap iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      .close-btn {
        margin-top: 20px;
        background: transparent;
        border: 1px solid rgba(245, 200, 66, 0.4);
        color: #f5c842;
        padding: 10px 32px;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        border-radius: 2px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .close-btn:hover {
        background: rgba(245, 200, 66, 0.1);
        border-color: #f5c842;
      }

      /* Target found flash */
      #target-flash {
        position: fixed;
        inset: 0;
        border: 3px solid #f5c842;
        pointer-events: none;
        z-index: 200;
        opacity: 0;
        box-shadow: inset 0 0 40px rgba(245, 200, 66, 0.2);
        transition: opacity 0.3s;
      }

      #target-flash.active {
        opacity: 1;
      }

      /* AR Scene */
      a-scene {
        position: fixed !important;
        inset: 0 !important;
        z-index: 1 !important;
      }
    </style>
  </head>

  <body>

    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="om-symbol">ॐ</div>
      <div class="loading-title">Krishna AR</div>
      <div class="loading-subtitle">Divine Experiences Await</div>
      <div class="loading-bar-wrap">
        <div class="loading-bar"></div>
      </div>
      <div class="loading-status">Initialising camera & recognition...</div>
    </div>

    <!-- Brand bar -->
    <div id="brand-bar">
      <div class="brand-dot"></div>
      <div class="brand-name">Krishna AR Demo</div>
    </div>

    <!-- Instructions -->
    <div id="instructions">
      <span class="scan-icon">📸</span>
      <div class="instruction-text">Point your camera at the image to experience</div>
    </div>

    <!-- Target recognised flash border -->
    <div id="target-flash"></div>

    <!-- YouTube Video Overlay -->
    <div id="video-overlay">
      <div class="video-header">✦ Experience the Divine ✦</div>
      <div class="video-frame-wrap">
        <iframe
          id="yt-iframe"
          src=""
          allow="autoplay; encrypted-media"
          allowfullscreen
        ></iframe>
      </div>
      <button class="close-btn" onclick="closeVideo()">✕ &nbsp; Close & Scan Again</button>
    </div>

    <!-- MindAR A-Frame Scene -->
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <!-- Golden glow plane that appears on the image -->
        <a-plane
          position="0 0 0.01"
          width="1"
          height="1"
          material="color: #f5c842; opacity: 0.15; transparent: true;"
          animation="property: material.opacity; from: 0; to: 0.15; dur: 800; easing: easeInOutSine"
        ></a-plane>

        <!-- OM text floating above -->
        <a-text
          value="ॐ"
          position="0 0.65 0.1"
          align="center"
          color="#f5c842"
          width="3"
          animation="property: position; from: 0 0.55 0.1; to: 0 0.65 0.1; dur: 2000; loop: true; dir: alternate; easing: easeInOutSine"
        ></a-text>

        <!-- Tap to watch button plane -->
        <a-plane
          id="play-btn-plane"
          position="0 -0.55 0.1"
          width="0.7"
          height="0.18"
          material="color: #f5c842; opacity: 0.9;"
          class="clickable"
          cursor-listener
        ></a-plane>
        <a-text
          value="▶  WATCH"
          position="0 -0.55 0.12"
          align="center"
          color="#1a0a2e"
          width="2.2"
          class="clickable"
        ></a-text>
      </a-entity>

      <!-- Cursor for clicking -->
      <a-entity
        cursor="fuse: false; rayOrigin: mouse"
        raycaster="objects: .clickable; far: 10"
      ></a-entity>

    </a-scene>

    <script>
      const YOUTUBE_URL = "https://www.youtube.com/embed/WZECLY-0ImM?autoplay=1&rel=0&modestbranding=1";

      // Hide loading screen after 3.2 seconds
      setTimeout(() => {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('brand-bar').classList.add('visible');
      }, 3200);

      // MindAR target events
      document.addEventListener('DOMContentLoaded', () => {
        const sceneEl = document.querySelector('a-scene');

        sceneEl.addEventListener('renderstart', () => {
          const arSystem = sceneEl.systems['mindar-image-system'];
          if (!arSystem) return;

          // Target found
          sceneEl.addEventListener('targetFound', () => {
            document.getElementById('target-flash').classList.add('active');
            document.getElementById('instructions').style.display = 'none';
            setTimeout(() => {
              document.getElementById('target-flash').classList.remove('active');
              openVideo();
            }, 600);
          });

          // Target lost
          sceneEl.addEventListener('targetLost', () => {
            document.getElementById('instructions').style.display = 'block';
          });
        });

        // Click on play button plane
        const playBtn = document.getElementById('play-btn-plane');
        if (playBtn) {
          playBtn.addEventListener('click', openVideo);
        }
      });

      function openVideo() {
        const overlay = document.getElementById('video-overlay');
        const iframe = document.getElementById('yt-iframe');
        iframe.src = YOUTUBE_URL;
        overlay.classList.add('active');
      }

      function closeVideo() {
        const overlay = document.getElementById('video-overlay');
        const iframe = document.getElementById('yt-iframe');
        iframe.src = '';
        overlay.classList.remove('active');
      }
    </script>
  </body>
</html>
