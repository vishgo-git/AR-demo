<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Krishna AR Demo</title>

<!-- Correct script order -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
background:#000;
font-family:Georgia,serif;
overflow:hidden;
height:100vh;
width:100vw;
}

/* Loading */
#loading-screen{
position:fixed;
inset:0;
background:linear-gradient(135deg,#1a0a2e,#2d1557,#1a0a2e);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
transition:opacity .8s ease;
}

#loading-screen.hidden{
opacity:0;
pointer-events:none;
}

.om-symbol{
font-size:72px;
color:#f5c842;
animation:pulse 2s ease-in-out infinite;
margin-bottom:20px;
}

@keyframes pulse{
0%,100%{transform:scale(1)}
50%{transform:scale(1.1)}
}

.loading-title{
color:#f5c842;
font-size:22px;
letter-spacing:4px;
margin-bottom:8px;
}

.loading-subtitle{
color:rgba(245,200,66,.6);
font-size:13px;
letter-spacing:2px;
margin-bottom:40px;
}

.loading-bar-wrap{
width:220px;
height:2px;
background:rgba(245,200,66,.15);
margin-bottom:16px;
}

.loading-bar{
height:100%;
background:#f5c842;
animation:load 3s ease forwards;
}

@keyframes load{
0%{width:0}
100%{width:100%}
}

/* Instructions */

#instructions{
position:fixed;
bottom:0;
left:0;
right:0;
padding:20px;
background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
z-index:100;
text-align:center;
}

.instruction-text{
color:#f5c842;
font-size:15px;
}

.scan-icon{
font-size:28px;
display:block;
margin-bottom:6px;
}

/* Brand */

#brand-bar{
position:fixed;
top:0;
left:0;
right:0;
padding:14px 20px;
background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);
z-index:100;
display:flex;
align-items:center;
gap:10px;
opacity:0;
}

#brand-bar.visible{opacity:1}

.brand-dot{
width:8px;
height:8px;
border-radius:50%;
background:#f5c842;
}

.brand-name{
color:#f5c842;
font-size:13px;
letter-spacing:3px;
}

/* Video overlay */

#video-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
z-index:500;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

#video-overlay.active{display:flex}

.video-header{
color:#f5c842;
margin-bottom:16px;
}

.video-frame-wrap{
width:100%;
max-width:500px;
aspect-ratio:16/9;
border:1px solid rgba(245,200,66,.3);
overflow:hidden;
}

.video-frame-wrap iframe{
width:100%;
height:100%;
border:none;
}

.close-btn{
margin-top:20px;
background:transparent;
border:1px solid rgba(245,200,66,.4);
color:#f5c842;
padding:10px 32px;
cursor:pointer;
}

/* Flash */

#target-flash{
position:fixed;
inset:0;
border:3px solid #f5c842;
pointer-events:none;
z-index:200;
opacity:0;
transition:opacity .3s;
}

#target-flash.active{opacity:1}

a-scene{
position:fixed!important;
inset:0!important;
z-index:1!important;
}
</style>
</head>

<body>

<div id="loading-screen">
<div class="om-symbol">ॐ</div>
<div class="loading-title">Krishna AR</div>
<div class="loading-subtitle">Divine Experiences Await</div>
<div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>

<div id="brand-bar">
<div class="brand-dot"></div>
<div class="brand-name">Krishna AR Demo</div>
</div>

<div id="instructions">
<span class="scan-icon">📸</span>
<div class="instruction-text">Point your camera at the image</div>
</div>

<div id="target-flash"></div>

<div id="video-overlay">
<div class="video-header">✦ Experience the Divine ✦</div>
<div class="video-frame-wrap">
<iframe id="yt-iframe" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>
<button class="close-btn" onclick="closeVideo()">Close</button>
</div>

<a-scene
id="scene"
mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;"
color-space="sRGB"
renderer="colorManagement:true"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"
>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

<a-entity id="target0" mindar-image-target="targetIndex:0">

<a-plane
position="0 0 0.01"
width="1"
height="1"
material="color:#f5c842;opacity:0.15;transparent:true">
</a-plane>

<a-text
value="ॐ"
position="0 0.65 0.1"
align="center"
color="#f5c842"
width="3">
</a-text>

</a-entity>

</a-scene>

<script>

const YOUTUBE_URL="https://www.youtube.com/embed/WZECLY-0ImM?autoplay=1";

setTimeout(()=>{
document.getElementById("loading-screen").classList.add("hidden");
document.getElementById("brand-bar").classList.add("visible");
},3000);

document.addEventListener("DOMContentLoaded", async ()=>{

const scene=document.querySelector("#scene");

scene.addEventListener("loaded", async ()=>{

const mindarSystem=scene.systems["mindar-image-system"];

try{
await mindarSystem.start();
console.log("Camera started");
}catch(err){
alert("Camera permission required.");
console.error(err);
}

});

const target=document.querySelector("#target0");

target.addEventListener("targetFound",()=>{
document.getElementById("target-flash").classList.add("active");
document.getElementById("instructions").style.display="none";

setTimeout(()=>{
document.getElementById("target-flash").classList.remove("active");
openVideo();
},600);

});

target.addEventListener("targetLost",()=>{
document.getElementById("instructions").style.display="block";
});

});

function openVideo(){
const overlay=document.getElementById("video-overlay");
const iframe=document.getElementById("yt-iframe");
iframe.src=YOUTUBE_URL;
overlay.classList.add("active");
}

function closeVideo(){
const overlay=document.getElementById("video-overlay");
const iframe=document.getElementById("yt-iframe");
iframe.src="";
overlay.classList.remove("active");
}

</script>

</body>
</html>
